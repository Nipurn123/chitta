name: Publish

# Tag-driven: only runs when a GitHub Release is published, never on push.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gate the publish on a green test run.
      - name: Test
        run: bun test

      # Write the npm token into ~/.npmrc so `bun publish` can authenticate.
      # The shell expands ${NPM_TOKEN} at write time, so the real token value
      # lands in the file (no reliance on bun expanding env vars inside .npmrc).
      # Skips (with a loud warning, keeping the run green) when the NPM_TOKEN
      # secret is not configured - e.g. a release cut before CI publishing is
      # set up, or one already published manually with `bun publish`.
      - name: Configure npm registry auth
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: bun publish --access public

      - name: Publish skipped (no NPM_TOKEN)
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: echo "::warning::NPM_TOKEN secret not configured - tests ran green but npm publish was SKIPPED. Add the secret (Settings -> Secrets -> Actions -> NPM_TOKEN) or publish manually with 'bun publish --access public'."
