name: Benchmark

# Manual trigger plus a weekly regression run of the deterministic Tier-A retrieval
# benchmark. Tier A needs no LLM and no network, so this is safe to run unattended.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run synthetic memory benchmark (Tier A, offline hash embedder)
        env:
          # Force the deterministic hashing embedder so the run is fully offline
          # (no model download). See src/embedded/index.ts: mode "hash" -> LocalHashEmbeddings.
          CONTEXT_EMBEDDINGS: hash
        run: |
          set -o pipefail

          # Open the run summary with a header and a fenced code block.
          {
            echo "## Chitta synthetic memory benchmark"
            echo ""
            echo "Tier A (retrieval) - offline hash embedder"
            echo "Command: bun run src/embedded/cli.ts bench synthetic --tier a"
            echo ""
            echo '```text'
          } >> "$GITHUB_STEP_SUMMARY"

          # Run the benchmark and tee the scorecard to both the job log and the summary.
          # pipefail + capturing the pipeline status keeps a benchmark failure fatal to
          # the step, while still letting us close the fenced block afterwards.
          status=0
          bun run src/embedded/cli.ts bench synthetic --tier a 2>&1 \
            | tee -a "$GITHUB_STEP_SUMMARY" || status=$?

          # Close the fenced code block on the summary.
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          exit "$status"
